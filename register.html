<!DOCTYPE html>
<html lang="en">

<head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Cholo Jaai</title>
  <link rel="stylesheet" href="index.css?v=2.0">
  <style>
    .auth-container {
      max-width: 500px;
      margin: 0 auto;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
      margin-bottom: -2px;
    }

    .pane {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .pane.active {
      display: block;
    }

    .type-switcher {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .type-card {
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-weight: 500;
    }

    .type-card.active {
      border-color: var(--primary);
      background: rgba(16, 185, 129, 0.05);
      color: var(--primary);
    }

    /* Social Auth Extensions */
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider::before {
      margin-right: 16px;
    }

    .divider::after {
      margin-left: 16px;
    }

    .social-auth-grid {
      display: flex;
      gap: 12px;
    }

    .btn-social {
      flex: 1;
      background: var(--surface);
      color: var(--text-main);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 0;
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .btn-social:hover {
      background: var(--bg-color);
      border-color: #cbd5e1;
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
  </style>
</head>

<body class="animate-fade-up">
  <!-- Global Mesh Background -->
  <div class="bg-mesh">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <main class="container" style="padding-top: 120px; padding-bottom: 60px;">
    <div class="auth-container card p-6">

      <div class="tabs">
        <div class="tab active" data-target="signin">Sign In</div>
        <div class="tab" data-target="signup">Create Account</div>
      </div>

      <!-- Sign In Pane -->
      <div id="signin" class="pane active">
        <h2 class="h3 mb-6">Welcome Back</h2>
        <form id="signinForm" novalidate>
          <div class="mb-4">
            <label>Email Address</label>
            <input type="email" class="input-box" name="email" required>
            <small id="signinEmailError" style="color: red; display: none; margin-top: 4px;">Invalid email format</small>
          </div>
          <div class="mb-6 border-b">
            <label>Password</label>
            <input type="password" class="input-box" name="password" required>
          </div>
          <div id="signinError" style="display:none; background: rgba(255,61,0,0.1); border: 1px solid rgba(255,61,0,0.4); color: #ff6b4a; border-radius: 8px; padding: 10px 14px; font-size: 0.9rem; margin-bottom: 12px;"></div>
          <button type="submit" id="signinBtn" class="btn btn-primary w-full">Sign In</button>
        </form>

        <div class="divider">or continue with</div>
        <div class="social-auth-grid">
          <button class="btn-social" type="button" aria-label="Sign in with Google">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
          </button>
          <button class="btn-social" type="button" aria-label="Sign in with Facebook">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path fill="#1877F2"
                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
            </svg>
          </button>
          <button class="btn-social" type="button" aria-label="Sign in with Apple">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path
                d="M16.365 14.12c-.015-3.08 2.505-4.545 2.625-4.62-1.425-2.085-3.645-2.37-4.425-2.4-1.89-.195-3.705 1.11-4.665 1.11-.96 0-2.445-1.08-4-1.05-2.025.03-3.9 1.185-4.935 3-2.085 3.63-.54 9.015 1.5 11.97 1.005 1.44 2.19 3.03 3.75 2.985 1.5-.045 2.085-.96 3.9-.96 1.8 0 2.34.96 3.9.93 1.605-.03 2.64-1.455 3.63-2.895 1.155-1.68 1.635-3.3 1.665-3.39-.03-.015-3.15-1.2-3.18-4.68zM14.94 4.545c.825-1.005 1.38-2.4 1.23-3.795-1.185.045-2.655.795-3.51 1.785-.675.765-1.335 2.19-1.155 3.555 1.32.105 2.64-.675 3.435-1.545z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Sign Up Pane -->
      <div id="signup" class="pane">
        <h2 class="h3 mb-6">Join Cholo Jaai</h2>

        <div class="type-switcher">
          <div class="type-card active" data-type="Traveler">I am a Traveler</div>
          <div class="type-card" data-type="Guide">I am a Guide</div>
        </div>

        <form id="signupForm" novalidate>
          <input type="hidden" id="acctType" value="Traveler">
          <div class="mb-4">
            <label>Full Name</label>
            <input type="text" class="input-box" name="name" required>
          </div>
          <div class="mb-4">
            <label>Email Address</label>
            <input type="email" class="input-box" name="email" required>
            <small id="signupEmailError" style="color: red; display: none; margin-top: 4px;">Invalid email format</small>
          </div>
          <div class="mb-4">
            <label>Gender</label>
            <select class="input-box" name="gender" required style="padding: 16px 12px; color: #f8fafc; cursor: pointer; background-color: rgba(255, 255, 255, 0.03);">
              <option value="" disabled selected>Select Gender</option>
              <option value="Male" style="color: #000;">Male</option>
              <option value="Female" style="color: #000;">Female</option>
              <option value="Other" style="color: #000;">Other</option>
            </select>
          </div>
          <div class="form-grid mb-6">
            <div>
              <label>Password</label>
              <input type="password" class="input-box" id="p1" required>
            </div>
            <div>
              <label>Confirm</label>
              <input type="password" class="input-box" id="p2" required>
            </div>
          </div>
          <button class="btn btn-primary w-full">Create Account</button>
        </form>

        <div class="divider">or sign up with</div>
        <div class="social-auth-grid">
          <button class="btn-social" type="button" aria-label="Sign up with Google">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
          </button>
          <button class="btn-social" type="button" aria-label="Sign up with Facebook">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path fill="#1877F2"
                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
            </svg>
          </button>
          <button class="btn-social" type="button" aria-label="Sign up with Apple">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path
                d="M16.365 14.12c-.015-3.08 2.505-4.545 2.625-4.62-1.425-2.085-3.645-2.37-4.425-2.4-1.89-.195-3.705 1.11-4.665 1.11-.96 0-2.445-1.08-4-1.05-2.025.03-3.9 1.185-4.935 3-2.085 3.63-.54 9.015 1.5 11.97 1.005 1.44 2.19 3.03 3.75 2.985 1.5-.045 2.085-.96 3.9-.96 1.8 0 2.34.96 3.9.93 1.605-.03 2.64-1.455 3.63-2.895 1.155-1.68 1.635-3.3 1.665-3.39-.03-.015-3.15-1.2-3.18-4.68zM14.94 4.545c.825-1.005 1.38-2.4 1.23-3.795-1.185.045-2.655.795-3.51 1.785-.675.765-1.335 2.19-1.155 3.555 1.32.105 2.64-.675 3.435-1.545z" />
            </svg>
          </button>
        </div>
      </div>

    </div>
  </main>

  <script src="common.js?v=2.0"></script>
  <script>
    // Redirect if already logged in — send to role-specific page
    document.addEventListener('DOMContentLoaded', () => {
      const userJSON = localStorage.getItem('CJ_USER') || localStorage.getItem('CJ_ADMIN');
      if (userJSON) {
        try {
          const u = JSON.parse(userJSON);
          const adminRoles = ['Master Admin', 'Moderator', 'Support Agent'];
          if (adminRoles.includes(u.type)) {
            window.location.replace('admin.html');
          } else if (u.type === 'Guide') {
            window.location.replace('guide-home.html');
          } else {
            window.location.replace('dashboard.html');
          }
        } catch(e) {
          window.location.replace('dashboard.html');
        }
      }
    });

    // Tab switching
    const tabs = document.querySelectorAll('.tab');
    const panes = document.querySelectorAll('.pane');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        panes.forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.target).classList.add('active');
      });
    });

    // Account Type switching
    const typeCards = document.querySelectorAll('.type-card');
    const acctType = document.getElementById('acctType');
    typeCards.forEach(c => {
      c.addEventListener('click', () => {
        typeCards.forEach(tc => tc.classList.remove('active'));
        c.classList.add('active');
        acctType.value = c.dataset.type;
      });
    });

    let isSigningIn = false;
    document.getElementById('signinForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSigningIn) return; // Prevent double-click

      const inputs = e.target.querySelectorAll('input.input-box');
      const emailInput = inputs[0];
      const emailError = document.getElementById('signinEmailError');
      const signinError = document.getElementById('signinError');
      const btn = document.getElementById('signinBtn');
      
      let isValid = true;
      const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;
      if (!emailRegex.test(emailInput.value)) {
        if(emailError) emailError.style.display = 'block';
        isValid = false;
      } else {
        if(emailError) emailError.style.display = 'none';
      }

      if (!isValid) return;

      if (!inputs[1].value) {
        signinError.textContent = 'Please enter your password.';
        signinError.style.display = 'block';
        return;
      }

      // Lock the button
      isSigningIn = true;
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      // Reset error box styles (may have been used for success message)
      signinError.style.background = 'rgba(255,61,0,0.1)';
      signinError.style.borderColor = 'rgba(255,61,0,0.4)';
      signinError.style.color = '#ff6b4a';
      signinError.style.display = 'none';

      try {
        const res = await APP.API.login(emailInput.value, inputs[1].value);

        if (res.success) {
          btn.textContent = '✓ Success! Redirecting...';
          localStorage.removeItem('CJ_USER');
          localStorage.removeItem('CJ_ADMIN');
          localStorage.setItem('CJ_USER', JSON.stringify(res.data));

          const adminRoles = ['Master Admin', 'Moderator', 'Support Agent'];

          // Route by role
          if (adminRoles.includes(res.data.type)) {
            // Set admin session and redirect to admin dashboard
            localStorage.setItem('CJ_ADMIN', JSON.stringify(res.data));
            location.href = 'admin.html';
          } else if (res.data.type === 'Guide') {
            location.href = 'guide-home.html';
          } else {
            // Traveler — check profile completion
            if (localStorage.getItem('CJ_PROFILE_COMPLETED_' + res.data.email)) {
              location.href = 'index.html';
            } else {
              try {
                const profRes = await APP.API.fetch('/api/data/profiles');
                if (profRes.success && profRes.data.some(p => p.email === res.data.email)) {
                  localStorage.setItem('CJ_PROFILE_COMPLETED_' + res.data.email, 'true');
                  location.href = 'index.html';
                } else {
                  location.href = 'dashboard.html';
                }
              } catch(e) {
                location.href = 'dashboard.html';
              }
            }
          }
        } else {
          signinError.textContent = res.message || 'Login failed. Please try again.';
          signinError.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
          isSigningIn = false;
        }
      } catch (error) {
        console.error(error);
        signinError.textContent = error.message || 'Login failed. Please check your credentials.';
        signinError.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
        isSigningIn = false;
      }
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nameVal  = e.target.elements['name'].value.trim();
      const emailVal = e.target.elements['email'].value.trim();
      const genderVal = e.target.elements['gender'].value;
      const p1 = document.getElementById('p1').value;
      const p2 = document.getElementById('p2').value;
      const emailError = document.getElementById('signupEmailError');
      const signinError = document.getElementById('signinError');

      // Validate name
      if (!nameVal) return alert('Please enter your full name.');

      // Validate email
      const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;
      if (!emailRegex.test(emailVal)) {
        if (emailError) emailError.style.display = 'block';
        return;
      }
      if (emailError) emailError.style.display = 'none';

      // Validate gender
      if (!genderVal) return alert('Please select your gender.');

      // Validate passwords
      if (!p1) return alert('Please create a password.');
      if (p1.length < 6) return alert('Password must be at least 6 characters.');
      if (p1 !== p2) return alert('Passwords do not match!');

      const payload = {
        name: nameVal,
        email: emailVal,
        password: p1,
        type: acctType.value,
        gender: genderVal
      };

      const submitBtn = e.target.querySelector('button[type="submit"]');
      const origText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating Account...';

      try {
        const res = await APP.API.save('users', payload);
        if (res.success) {
          e.target.reset();
          acctType.value = 'Traveler';
          document.querySelectorAll('.type-card').forEach(tc => tc.classList.remove('active'));
          document.querySelector('.type-card[data-type="Traveler"]').classList.add('active');
          // Switch to Sign In tab and show success
          tabs[0].click();
          signinError.style.background = 'rgba(0,230,118,0.1)';
          signinError.style.borderColor = 'rgba(0,230,118,0.4)';
          signinError.style.color = 'var(--primary)';
          signinError.textContent = '✓ Account created! Please sign in with your new credentials.';
          signinError.style.display = 'block';
        } else {
          alert(res.message || 'Failed to create account. Please try again.');
        }
      } catch(err) {
        alert(err.message || 'Network error. Please ensure the server is running.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = origText;
      }
    });

    // Social Auth Placeholder
    document.querySelectorAll('.btn-social').forEach(btn => {
      btn.addEventListener('click', () => {
        alert('Social authentication is coming soon! Please use email/password for now.');
      });
    });
  </script>
</body>

</html>
