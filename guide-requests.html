<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide Portal | Cholo Jaai</title>
  <link rel="stylesheet" href="index.css?v=2.0">
  <style>
    .portal-container { max-width: 900px; margin: 0 auto; padding-top: 120px; padding-bottom: 60px; }
    .req-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 24px;
      margin-bottom: 16px; transition: all 0.2s;
    }
    .req-card:hover { border-color: var(--primary); transform: translateY(-3px); }
  </style>
</head>
<body class="animate-fade-up">
  <div class="bg-mesh">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <main class="container portal-container">
    <h1 class="h2 mb-2">My Assigned <span class="text-gradient">Tour Requests</span></h1>
    <p class="text-muted mb-8" style="font-size: 1.1rem;">Review your upcoming traveler assignments.</p>
    
    <div id="requestsList">
      <div class="text-center text-muted py-12">Checking network...</div>
    </div>
  </main>

  <script src="common.js?v=2.0"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const userJSON = localStorage.getItem('CJ_USER');
      if (!userJSON) {
        window.location.href = 'register.html';
        return;
      }
      const myUser = JSON.parse(userJSON);
      if (myUser.type === 'Traveler') {
        window.location.href = 'dashboard.html';
        return;
      }

      try {
        const res = await APP.API.fetch('/api/data/guidedTours');
        
        let assignments = [];
        if (res.success) {
          assignments = res.data.filter(r => r.guide === myUser.name || r.guide === 'Random');
        }

        const list = document.getElementById('requestsList');
        if (assignments.length === 0) {
          list.innerHTML = '<div class="card p-8 text-center text-muted">You have no pending assignments right now.</div>';
          return;
        }

        list.innerHTML = assignments.reverse().map(r => `
          <div class="req-card flex justify-between items-center">
            <div>
              <div class="flex items-center gap-4 mb-2">
                <span class="badge" style="background: ${r.guide === 'Random' ? 'rgba(255,255,255,0.1)' : 'rgba(0,230,118,0.1)'}; color: ${r.guide === 'Random' ? 'var(--text-main)' : 'var(--primary)'};">
                  ${r.guide === 'Random' ? 'Random Assignment' : `<span style="color:var(--secondary); text-transform: none;">🌟 ${r.name} selected you as their guide!</span>`}
                </span>
                <span class="text-muted small">ID #${r.id}</span>
              </div>
              <h3 class="h3 mb-2">${r.destination} (<span style="font-size: 1.2rem; font-weight:500;">${r.language}</span>)</h3>
              <p style="color:var(--text-muted);"><strong style="color:white;">Traveler:</strong> ${r.name}</p>
              <p style="color:var(--text-muted);"><strong style="color:white;">Mobile (WhatsApp):</strong> ${r.phone}</p>
            </div>
            <div>
               <a href="https://wa.me/${r.phone}" target="_blank" class="btn btn-primary" style="padding: 10px 20px;">Contact Traveler</a>
            </div>
          </div>
        `).join('');

      } catch (err) {
        document.getElementById('requestsList').innerHTML = '<div class="card p-6 text-center text-accent">Network error loading requests.</div>';
      }
    });
  </script>
</body>
</html>
