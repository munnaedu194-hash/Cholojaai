<!DOCTYPE html>
<html lang="en">

<head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Packages | Cholo Jaai</title>
  <link rel="stylesheet" href="index.css?v=2.0">
  <style>
    .packages-wrapper {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Adapting the layout structure to our native Dark/Glass theme */
    .pkg-card {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 24px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      text-decoration: none;
      color: var(--text-main);
      box-shadow: var(--shadow-md);
      height: 200px;
      /* Force all cards to be exactly the same size */
    }

    .pkg-card:hover {
      box-shadow: var(--shadow-lg), 0 0 20px rgba(0, 230, 118, 0.15);
      transform: translateY(-6px);
      border-color: rgba(0, 230, 118, 0.4);
    }

    .pkg-img-wrapper {
      width: 260px;
      flex-shrink: 0;
      position: relative;
    }

    .pkg-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.5s ease;
    }

    .pkg-card:hover .pkg-img {
      filter: contrast(1.1) brightness(1.1);
    }

    .points-badge {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    .points-badge svg {
      color: #FCD34D;
    }

    .pkg-content {
      padding: 18px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .pkg-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 8px;
      line-height: 1.3;
      transition: color 0.3s ease;
    }

    .pkg-card:hover .pkg-title {
      color: var(--primary);
    }

    .pkg-location {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--secondary);
      font-weight: 500;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .pkg-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .pkg-meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pkg-pricing {
      padding: 18px 24px;
      min-width: 165px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-start;
      border-left: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .pkg-pricing-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .pkg-price {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      display: flex;
      align-items: baseline;
      gap: 6px;
      line-height: 1;
    }

    .pkg-currency {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .pkg-per-person {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .pkg-card {
        flex-direction: column;
        height: auto;
      }

      .pkg-img-wrapper {
        width: 100%;
        height: 240px;
      }

      .pkg-pricing {
        border-left: none;
        border-top: 1px solid var(--border);
        align-items: center;
        flex-direction: row;
        justify-content: space-between;
      }

      .pkg-pricing>div {
        text-align: left !important;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body class="animate-fade-up">
  <!-- Global Mesh Background -->
  <div class="bg-mesh">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <main class="container" style="padding-top: 100px; padding-bottom: 60px;">
    <div style="margin-bottom: 36px;">
      <h1 class="h1 mb-3">Available Packages</h1>
      <p class="text-muted" style="font-size: 0.95rem;">Discover carefully curated trips matching your exact aesthetic preference.</p>
    </div>

    <div class="packages-wrapper" id="packagesList">
      <!-- Injected via JS -->
    </div>
  </main>


  <script src="common.js?v=2.0"></script>
  <script>
    // SVG Icons
    const pinIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>`;
    const clockIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
    const peopleIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`;
    const docIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`;
    const starIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15 8H21L16 12L18 18L12 15L6 18L8 12L3 8H9L12 2Z"></path></svg>`;

    async function loadPackages() {
      const list = document.getElementById('packagesList');
      list.innerHTML = '<p class="text-center text-muted py-12">Loading packages...</p>';
      
      try {
        const res = await APP.API.fetch('/api/data/packages');
        let packagesData = [];
        
        if (res.success && res.data.length > 0) {
          packagesData = res.data;
        } else {
          // Fallback to initial packages if database is empty
          packagesData = [
            { location: "sajek", title: "Sajek Valley Experience Package - 3 Days & 2 Nights", image: "pic/sajek.jpg", duration: "3 days", price: "7500" },
            { location: "bandarban", title: "Bandarban Adventure & Tribal Culture", image: "pic/bandarban.jpg", duration: "2 days", price: "6500" },
            { location: "sundarbans", title: "Sundarbans Mangrove Safari - The Wild Heart", image: "pic/sundarbans.jpg", duration: "3 days", price: "12500" },
            { location: "saint-martin", title: "Saint Martin Island Retreat - Coral Paradise", image: "pic/saint-martin.jpg", duration: "3 days", price: "9800" }
          ];
        }

        list.innerHTML = '';
        packagesData.forEach(pkg => {
          const card = document.createElement('a');
          const slug = pkg.location.toLowerCase().replace(/[^a-z0-9]+/g, '-');
          card.href = `destination.html?slug=${slug}`;
          card.className = 'pkg-card animate-fade-up';
          card.innerHTML = `
            <div class="pkg-img-wrapper">
              <img src="${pkg.image}" class="pkg-img" alt="${pkg.title}">
              <div class="points-badge">
                ${starIcon} Get Points
              </div>
            </div>
            
            <div class="pkg-content">
              <div>
                <h2 class="pkg-title">${pkg.title}</h2>
                <div class="pkg-location" style="text-transform: capitalize;">
                  ${pinIcon} ${pkg.location.replace(/-/g, ' ')}
                </div>
              </div>
              
              <div class="pkg-meta">
                <div class="pkg-meta-item">${clockIcon} ${pkg.duration}</div>
                <div class="pkg-meta-item">${peopleIcon} Customizable</div>
                <div class="pkg-meta-item">${docIcon} See Terms</div>
              </div>
            </div>
            
            <div class="pkg-pricing">
              <div style="display: flex; flex-direction: column; align-items: flex-end;">
                <div class="pkg-pricing-label">Starting From</div>
                <div class="pkg-price">
                  <span class="pkg-currency">BDT</span> ${pkg.price}
                </div>
                <div class="pkg-per-person">Per Person</div>
              </div>
            </div>
          `;
          list.appendChild(card);
        });
      } catch (err) {
        list.innerHTML = '<p class="text-center text-accent py-12">Failed to load packages. Please check your connection.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadPackages);
  </script>
</body>

</html>
