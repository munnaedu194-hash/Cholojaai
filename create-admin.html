<!DOCTYPE html>
<html lang="en">

<head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Staff | Cholo Jaai</title>
  <link rel="stylesheet" href="index.css?v=2.0">
  <script>
    // Security check: ensure only Master Admin can access this page
    (function() {
      const adminSession = localStorage.getItem('CJ_ADMIN');
      const userSession = localStorage.getItem('CJ_USER');
      let isMasterAdmin = false;
      if (adminSession) {
        try { isMasterAdmin = JSON.parse(adminSession).type === 'Master Admin'; } catch(e) {}
      }
      if (!isMasterAdmin && userSession) {
        try { isMasterAdmin = JSON.parse(userSession).type === 'Master Admin'; } catch(e) {}
      }
      if (!isMasterAdmin) window.location.replace('admin-login.html');
    })();
  </script>
  <style>
    .admin-container {
      max-width: 600px;
      margin: 0 auto;
      padding-top: 150px;
      padding-bottom: 60px;
    }
  </style>
</head>

<body class="animate-fade-up">
  <!-- Global Mesh Background -->
  <div class="bg-mesh">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <main class="container admin-container">
    <div class="card p-8" style="border-top: 4px solid var(--primary); position: relative; overflow: hidden;">
      
      <!-- Decorative background -->
      <div style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: var(--primary); filter: blur(80px); opacity: 0.15; z-index: 0; pointer-events: none;"></div>

      <div style="position: relative; z-index: 1;">
        <h2 class="h2 mb-2 flex items-center gap-3">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
          </svg>
          Create <span class="text-gradient">Admin</span>
        </h2>
        <p class="text-muted mb-8" style="font-size: 1.1rem;">Fill in the details below to add a new staff member to the system.</p>

        <form id="createStaffForm">
          <div class="mb-4">
            <label style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 6px; display: block;">Full Name</label>
            <input type="text" class="input-box" id="staffName" placeholder="e.g. John Doe" required>
          </div>
          
          <div class="mb-4">
            <label style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 6px; display: block;">Email Address</label>
            <input type="email" class="input-box" id="staffEmail" placeholder="admin@example.com" required>
          </div>
          
          <div class="grid grid-cols-2 gap-4 mb-8">
            <div>
              <label style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 6px; display: block;">Temporary Password</label>
              <input type="password" class="input-box" id="staffPassword" placeholder="Create password" required>
            </div>
            <div>
              <label style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 6px; display: block;">Assign Role</label>
              <select class="input-box" id="staffRole" required style="padding: 14px 12px; color: #f8fafc; cursor: pointer; background-color: rgba(255, 255, 255, 0.03); appearance: none;">
                <option value="Moderator" style="color: #000;">Moderator (Manage Bookings)</option>
                <option value="Support Agent" style="color: #000;">Support Agent (View Only)</option>
                <option value="Master Admin" style="color: #000;">Master Admin (Full Access)</option>
              </select>
            </div>
          </div>
          
          <button class="btn btn-primary w-full flex items-center justify-center gap-2" type="submit" style="padding: 16px; font-size: 1.1rem;">
            Create Staff Account
          </button>
        </form>
      </div>
      
      <div class="mt-8 pt-8" style="border-top: 1px solid var(--border); position: relative; z-index: 1;">
        <h3 class="h3 mb-4">Existing Staff</h3>
        <div class="data-table-container mt-0" style="background: rgba(0,0,0,0.2);">
          <table style="width: 100%; text-align: left;">
            <thead>
              <tr><th style="padding: 12px; color: var(--text-muted);">Name</th><th style="padding: 12px; color: var(--text-muted);">Email</th><th style="padding: 12px; color: var(--text-muted);">Role</th></tr>
            </thead>
            <tbody id="staffTbody">
              <tr><td colspan="3" class="text-center py-4 text-muted">Loading staff...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script src="common.js?v=2.0"></script>
  <script>
    async function loadStaff() {
      try {
        const res = await APP.API.fetch('/api/data/users');
        if (res.success) {
          const staffUsers = res.data.filter(u => ['Master Admin', 'Moderator', 'Support Agent'].includes(u.type));
          const sTbody = document.getElementById('staffTbody');
          if (staffUsers.length === 0) sTbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">No staff found.</td></tr>';
          else sTbody.innerHTML = staffUsers.map(u => `
            <tr>
              <td style="padding: 12px;" class="td-highlight">${u.name}</td>
              <td style="padding: 12px;">${u.email}</td>
              <td style="padding: 12px;"><span class="badge" style="background: rgba(0,230,118,0.1); color: var(--primary); font-size:0.75rem;">${u.type}</span></td>
            </tr>
          `).join('');
        }
      } catch (e) {
        console.error(e);
      }
    }
    
    document.addEventListener('DOMContentLoaded', loadStaff);

    document.getElementById('createStaffForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        name: document.getElementById('staffName').value,
        email: document.getElementById('staffEmail').value,
        password: document.getElementById('staffPassword').value,
        type: document.getElementById('staffRole').value
      };
      
      const btn = e.target.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = 'Creating...';
      btn.disabled = true;

      try {
        const res = await APP.API.save('users', payload);
        alert(res.message || 'Staff created successfully!');
        if(res.success) {
          e.target.reset();
          loadStaff(); // Reload the staff table
        }
      } catch(error) {
        alert(error.message || 'Network error occurred.');
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    });
  </script>
</body>

</html>
